name: "Build and Upload Apex Wheels"
description: "Build, smoke-test, and upload NVIDIA Apex wheels"

inputs:
  python-version:
    description: "Python version (e.g. 3.12)"
    required: true
  torch-version:
    description: "PyTorch version (e.g. 2.9.1)"
    required: true
  cuda-version:
    description: "CUDA toolkit version (e.g. 12.8)"
    required: true
  cuda-arch-list:
    description: "TORCH_CUDA_ARCH_LIST value (e.g. '8.0 8.6 9.0+PTX')"
    required: true
  apex-commit:
    description: "Apex git commit SHA to build"
    required: true
  release-tag:
    description: "GitHub release tag to upload wheels to"
    required: true

outputs:
  wheel-path:
    description: "Path to the built wheel"
    value: ${{ steps.build_wheels.outputs.WHEEL_PATH }}

runs:
  using: "composite"
  steps:
    - name: Install OS build dependencies
      shell: bash
      run: |
        apt-get update
        apt-get install -y ninja-build clang time patchelf git curl
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
          | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
          | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        apt-get update
        apt-get install -y gh

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python
      shell: bash
      run: |
        uv venv -p ${{ inputs.python-version }}
        uv pip install -U pip "setuptools>=75" wheel packaging auditwheel
        echo "$(pwd)/.venv/bin" >> $GITHUB_PATH

    - name: Setup CUDA
      shell: bash
      run: |
        python scripts/setup_cuda.py ${{ inputs.cuda-version }}

    - name: Build wheels
      id: build_wheels
      shell: bash
      env:
        TORCH_CUDA_ARCH_LIST: ${{ inputs.cuda-arch-list }}
      run: |
        chmod +x build_linux.sh
        ./build_linux.sh \
          ${{ inputs.python-version }} \
          ${{ inputs.torch-version }} \
          ${{ inputs.cuda-version }} \
          ${{ inputs.apex-commit }}
        wheel_path=$(ls apex/dist/*.whl | head -n 1)
        echo "WHEEL_PATH=$wheel_path" >> $GITHUB_OUTPUT

    - name: Smoke-test install
      shell: bash
      run: |
        pip install --no-cache-dir ${{ steps.build_wheels.outputs.WHEEL_PATH }}
        python -c "import apex; print('apex imported successfully')"
        python -c "
        try:
            import amp_C; print('amp_C loaded')
        except ImportError:
            print('amp_C not available (python-only build)')
        "

    - name: Upload to release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        wheel_path="${{ steps.build_wheels.outputs.WHEEL_PATH }}"
        gh release upload "${{ inputs.release-tag }}" "$wheel_path" \
          --clobber --repo "$GITHUB_REPOSITORY"

    - name: Apply auditwheel repair
      continue-on-error: true
      id: auditwheel_repair
      shell: bash
      run: |
        DIST_MANYLINUX_DIR="apex/dist_manylinux"
        mkdir -p "$DIST_MANYLINUX_DIR"
        auditwheel show ${{ steps.build_wheels.outputs.WHEEL_PATH }}
        auditwheel repair \
          --exclude 'libc10*' --exclude 'libtorch*' --exclude 'libcu*' --exclude 'libnv*' \
          ${{ steps.build_wheels.outputs.WHEEL_PATH }} -w "$DIST_MANYLINUX_DIR"
        wheel_path_manylinux=$(ls "$DIST_MANYLINUX_DIR"/*manylinux*.whl 2>/dev/null | head -n 1 || echo "")
        echo "WHEEL_PATH_MANYLINUX=$wheel_path_manylinux" >> $GITHUB_OUTPUT

    - name: Test manylinux wheel
      continue-on-error: true
      shell: bash
      run: |
        ml_wheel="${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}"
        if [ -n "$ml_wheel" ] && [ -f "$ml_wheel" ]; then
          pip install --force-reinstall --no-cache-dir "$ml_wheel"
          python -c "import apex; print('manylinux wheel OK')"
        fi

    - name: Upload manylinux wheel to release
      continue-on-error: true
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        ml_wheel="${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}"
        if [ -n "$ml_wheel" ] && [ -f "$ml_wheel" ]; then
          gh release upload "${{ inputs.release-tag }}" "$ml_wheel" \
            --clobber --repo "$GITHUB_REPOSITORY"
        else
          echo "Skipping manylinux upload: file not found"
        fi
