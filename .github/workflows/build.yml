name: Build Apex wheels

on:
  workflow_dispatch:
    inputs:
      apex-commit:
        description: "Apex git commit SHA to build"
        required: true

permissions:
  contents: write

jobs:

  create_matrix:
    name: Create Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.create_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Matrix
        id: create_matrix
        run: |
          python3 -m scripts.coverage_matrix matrix | tee /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> $GITHUB_OUTPUT

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ inputs.apex-commit }}"
          if gh release view "$tag" &>/dev/null; then
            echo "Release $tag already exists — reusing it"
          else
            gh release create "$tag" \
              --title "apex @ $tag" \
              --notes "NVIDIA Apex pre-built wheels for commit \`$tag\`"
          fi

  # -------------------------------------------------------------------
  # Linux x86_64 builds
  # -------------------------------------------------------------------
  build_wheels_linux:
    name: "py${{ matrix.python-version }}-torch${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}"
    needs: [create_matrix, create_release]
    runs-on: self-hosted
    timeout-minutes: 330
    container:
      image: nvidia/cuda:${{ matrix.cuda-version }}.0-devel-ubuntu22.04
    env:
      DEBIAN_FRONTEND: noninteractive
      TERM: xterm-256color
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromjson(needs.create_matrix.outputs.matrix).linux.python-version }}
        torch-version: ${{ fromjson(needs.create_matrix.outputs.matrix).linux.torch-version }}
        cuda-version: ${{ fromjson(needs.create_matrix.outputs.matrix).linux.cuda-version }}
        include: ${{ fromjson(needs.create_matrix.outputs.matrix).include }}
        exclude: ${{ fromjson(needs.create_matrix.outputs.matrix).exclude }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and upload wheels
        uses: ./.github/actions/build-and-upload
        with:
          python-version: ${{ matrix.python-version }}
          torch-version: ${{ matrix.torch-version }}
          cuda-version: ${{ matrix.cuda-version }}
          cuda-arch-list: ${{ matrix.cuda-arch-list }}
          apex-commit: ${{ inputs.apex-commit }}
          release-tag: ${{ inputs.apex-commit }}
