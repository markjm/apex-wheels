name: Build Apex wheels and upload to GitHub Releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      apex-commit:
        description: "Apex git ref to build (default: master)"
        required: false
        default: "master"

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "NVIDIA Apex pre-built wheels — ${{ github.ref_name }}"

  create_matrix:
    name: Create Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.create_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Matrix
        id: create_matrix
        run: |
          python3 -m scripts.coverage_matrix matrix | tee /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> $GITHUB_OUTPUT

  # Derive the Apex git ref: workflow_dispatch input takes priority,
  # otherwise strip the leading "v" from the tag name (v25.09 → 25.09).
  resolve_apex_ref:
    name: Resolve Apex ref
    runs-on: ubuntu-latest
    outputs:
      apex-commit: ${{ steps.resolve.outputs.apex-commit }}
    steps:
      - name: Resolve
        id: resolve
        run: |
          if [[ -n "${{ inputs.apex-commit }}" ]]; then
            echo "apex-commit=${{ inputs.apex-commit }}" >> "$GITHUB_OUTPUT"
          else
            ref="${{ github.ref_name }}"
            echo "apex-commit=${ref#v}" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  # Linux x86_64 builds
  # -------------------------------------------------------------------
  build_wheels_linux:
    name: "py${{ matrix.python-version }}-torch${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}"
    needs: [create_release, create_matrix, resolve_apex_ref]
    if: |
      always()
      && needs.create_matrix.result == 'success'
      && needs.resolve_apex_ref.result == 'success'
      && fromjson(needs.create_matrix.outputs.matrix).linux
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      DEBIAN_FRONTEND: noninteractive
      TERM: xterm-256color
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromjson(needs.create_matrix.outputs.matrix).linux.python-version }}
        torch-version: ${{ fromjson(needs.create_matrix.outputs.matrix).linux.torch-version }}
        cuda-version: ${{ fromjson(needs.create_matrix.outputs.matrix).linux.cuda-version }}
        exclude: ${{ fromjson(needs.create_matrix.outputs.matrix).exclude }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and upload wheels
        uses: ./.github/actions/build-and-upload
        with:
          python-version: ${{ matrix.python-version }}
          torch-version: ${{ matrix.torch-version }}
          cuda-version: ${{ matrix.cuda-version }}
          apex-commit: ${{ needs.resolve_apex_ref.outputs.apex-commit }}
          is-upload: ${{ needs.create_release.result == 'success' }}
